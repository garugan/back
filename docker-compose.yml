services:
  mysql:
    image: mysql:8.4
    container_name: mogu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: mogu
      MYSQL_USER: mogu
      MYSQL_PASSWORD: mogu_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -umogu -pmogu_password"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
